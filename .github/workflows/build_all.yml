name: Build Jarvis — EXE + APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements_pc.txt') }}
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_pc.txt
      - name: Build EXE
        working-directory: pc
        run: pyinstaller jarvis.spec
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Windows-EXE
          path: pc/dist/Jarvis.exe
          retention-days: 30

  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            pkg-config autoconf automake libtool cmake \
            libpython3-dev python3-dev ccache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + install tools
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.37

      - name: Inject API Keys
        working-directory: android
        # This creates api_secrets.py and writes your GitHub Secrets into it safely
        run: |
          echo "GROQ_API_KEY = '${{ secrets.GROQ_API_KEY }}'" > api_secrets.py
          echo "GEMINI_API_KEY = '${{ secrets.GEMINI_API_KEY }}'" >> api_secrets.py

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v3-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: buildozer-v3-

      - name: Build APK
        working-directory: android
        timeout-minutes: 45
        env:
          ANDROIDAPI: "34"
          ANDROIDMINAPI: "21"
          ANDROIDNDK: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          buildozer android clean
          yes | buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Android-APK
          path: android/bin/*.apk
          retention-days: 30
          if-no-files-found: warn