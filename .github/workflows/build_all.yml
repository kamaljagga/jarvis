name: Build Jarvis — EXE + APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements_pc.txt') }}
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_pc.txt
      - name: Build EXE
        working-directory: pc
        run: pyinstaller jarvis.spec
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Windows-EXE
          path: pc/dist/Jarvis.exe
          retention-days: 30

  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip libffi-dev libssl-dev \
            build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            pkg-config \
            libssl-dev \
            autoconf automake libtool \
            cmake

      - name: Set up Android SDK + accept licenses
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          yes | sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" > /dev/null 2>&1
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools
          pip install -r requirements_android.txt

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        working-directory: android
        timeout-minutes: 30
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          # Fix openssl pkg-config issue
          CFLAGS: "-I/usr/include/openssl"
          LDFLAGS: "-L/usr/lib/x86_64-linux-gnu -lssl -lcrypto"
        run: yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Android-APK
          path: android/bin/*.apk
          retention-days: 30
          if-no-files-found: warn