name: Build Jarvis — EXE + APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements_pc.txt') }}

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_pc.txt

      - name: Build EXE
        working-directory: pc
        run: pyinstaller jarvis.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Windows-EXE
          path: pc/dist/Jarvis.exe
          retention-days: 30

  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System packages
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-android-${{ hashFiles('requirements_android.txt') }}

      - name: Install packages
        run: pip install -r requirements_android.txt

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        working-directory: android
        run: buildozer android debug 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Android-APK
          path: android/bin/*.apk
          retention-days: 30